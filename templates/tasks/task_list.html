{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="h4 mb-0">Tasks</h2>
  <a class="btn btn-primary" href="{% url 'task_create' %}">Create Task</a>
</div>
<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Project</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for task in tasks %}
          <tr>
            <td>{{ task.title }}</td>
            <td>{{ task.get_status_display }}</td>
            <td>{{ task.project.name }}</td>
            <td class="text-end">
              <a class="btn btn-sm btn-outline-primary" href="{% url 'task_detail' task.id %}">View</a>
              <a class="btn btn-sm btn-outline-secondary" href="{% url 'task_update' task.id %}">Edit</a>
            </td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="4" class="text-center text-muted py-4">No tasks yet.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
