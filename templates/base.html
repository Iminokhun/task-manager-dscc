<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Task Manager</a>
      <div class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <a class="nav-link" href="{% url 'task_list' %}">Tasks</a>
          <a class="nav-link" href="{% url 'project_list' %}">Projects</a>
          <form method="post" action="{% url 'logout' %}" class="nav-item d-flex align-items-center">
              {% csrf_token %}
            <button type="submit" class="nav-link btn btn-link p-0 m-0 border-0">Logout</button>
          </form>
        {% else %}
          <a class="nav-link" href="{% url 'login' %}">Login</a>
          <a class="nav-link" href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
